<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>다연어 분석 서비스</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      background: #f1f1f1;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>다연어 분석</h1>
    <textarea id="inputText" placeholder="문장을 입력하세요...(영어로 해야함ㅎ)"></textarea>
    <br />
    <button onclick="analyze()">분석하기</button>

    <div class="result" id="result" style="display:none;">
      <p><strong>입력 문장:</strong> <span id="resText"></span></p>
      <p><strong>감정:</strong> <span id="resEmotion"></span></p>
      <p><strong>점수:</strong> <span id="resScore"></span></p>
    </div>
  </div>

  <script>
    async function analyze() {
      const text = document.getElementById("inputText").value;

      if (!text) {
        alert("문장을 입력하세요!");
        return;
      }

      try {
        const response = await fetch("https://undeliberative-ramblingly-marnie.ngrok-free.dev/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text })
        });

        const data = await response.json();

        document.getElementById("result").style.display = "block";
        document.getElementById("resText").innerText = data["메세지"];
        document.getElementById("resEmotion").innerText = data["감정"];
        document.getElementById("resScore").innerText = data["점수"].toFixed(4);

      } catch (error) {
        console.error(error);
        alert("서버 요청 실패");
      }
    }
  </script>
</body>
</html>
